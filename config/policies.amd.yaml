# MAAT policies — AMD Developer Cloud launch config (real models, real prices).
# Selected via MAAT_CONFIG=/app/config/policies.amd.yaml (docker-compose.amd.yml does this).
#
# Tiers:
#   normal    -> Fireworks AI serverless: Kimi K2.6 (frontier-priced)
#   downgrade -> Gemma 3 4B on the SAME AMD MI300X via vLLM/ROCm — $0, AMD-hosted Gemma
#   fallback  -> if the local tier is unset/down: gpt-oss-120b on Fireworks
#
# Note: the hackathon Fireworks key exposes no serverless Gemma; Gemma in this
# stack therefore lives where the prize says it should — on the AMD GPU itself.

defaults:
  budget_usd: 1.00
  warn_at: 0.70
  downgrade_at: 0.90
  downgrade_model: accounts/fireworks/models/gpt-oss-120b  # used only if local_tier is down
  mode: enforce

workflows:
  demo-rogue:
    budget_usd: 0.25
  demo-good:
    budget_usd: 1.00
  demo-observe:           # shadow mode: flags what it WOULD kill, blocks nothing
    mode: observe
    budget_usd: 0.05
  keyed-demo:
    api_key: maat-sk-keyed-demo-ROTATE-ME
    budget_usd: 0.50
  gpu-demo:               # demo pacing: thresholds sized so 2-3 Kimi calls cross
    budget_usd: 0.005     # the downgrade line deterministically (per-call cost
    warn_at: 0.15         # varies with output length), and the kill line stays
    downgrade_at: 0.22    # out of reach -> live reroute to $0 Gemma on the MI300X

loop:
  repeat_threshold: 3
  window_seconds: 120
  similarity: 0.92
  rate_per_minute: 30

# The $0 tier: vLLM OpenAI server on the same AMD GPU (see docker-compose.amd.yml).
local_tier:
  base_url: http://vllm:8000/v1
  model: google/gemma-3-4b-it

# Real Fireworks serverless prices (fireworks.ai/pricing, July 2026).
pricing:
  default:
    input_per_1m: 0.20
    output_per_1m: 0.80
  accounts/fireworks/models/kimi-k2p6:
    input_per_1m: 0.95
    output_per_1m: 4.00
  accounts/fireworks/models/gpt-oss-120b:
    input_per_1m: 0.15
    output_per_1m: 0.60
