services:
  maat:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      - MAAT_DB=/app/data/maat.db
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 3
