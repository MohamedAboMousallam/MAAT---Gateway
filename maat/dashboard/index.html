<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MAAT — every token, weighed</title>
<style>
  :root{
    --obsidian:#14120E; --basalt:#1E1B15; --line:#332E22;
    --papyrus:#EAE0C8; --sand:#8D8468;
    --gold:#C9A227; --faience:#3FA69B; --oxide:#C24A2E;
    --mono:ui-monospace,"Cascadia Code","SF Mono",Consolas,monospace;
    --display:Georgia,"Times New Roman",serif;
    --body:system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--obsidian);color:var(--papyrus);font-family:var(--body);
       min-height:100vh;padding:0 clamp(12px,3vw,40px) 60px}

  header{display:flex;flex-wrap:wrap;align-items:baseline;gap:14px 26px;
         padding:26px 0 18px;border-bottom:2px solid var(--gold)}
  .mark{font-family:var(--display);font-size:clamp(26px,4vw,38px);color:var(--gold);
        letter-spacing:.28em;font-variant:small-caps}
  .mark .glyph{letter-spacing:0;margin-right:.25em}
  .tag{color:var(--sand);font-style:italic;font-family:var(--display)}
  .spacer{flex:1}
  .chip{font-family:var(--mono);font-size:12px;border:1px solid var(--line);
        padding:4px 10px;border-radius:2px;color:var(--sand)}
  .chip b{color:var(--faience);font-weight:600}
  .totals{font-family:var(--mono);font-size:13px;color:var(--sand)}
  .totals b{color:var(--papyrus);font-size:16px}

  h2{font-family:var(--display);font-variant:small-caps;letter-spacing:.22em;
     font-weight:400;color:var(--sand);font-size:15px;margin:30px 0 14px}

  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .card{position:relative;background:var(--basalt);border:1px solid var(--line);
        border-radius:3px;padding:16px 16px 14px;overflow:hidden}
  .card.killed{border-color:var(--oxide)}
  .row{display:flex;align-items:baseline;gap:10px}
  .wfname{font-family:var(--display);font-variant:small-caps;letter-spacing:.12em;
          font-size:18px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pill{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:2px;
        border:1px solid currentColor}
  .pill.active{color:var(--faience)} .pill.killed{color:var(--oxide)}
  .badge{font-family:var(--mono);font-size:10px;color:var(--gold);
         border:1px dashed var(--gold);padding:1px 6px;border-radius:2px}

  .beam{margin:14px 0 6px}
  .beam .bar{position:relative;height:10px;background:#0D0C09;border:1px solid var(--line);
             border-radius:2px}
  .beam .fill{position:absolute;inset:0;width:0;background:var(--gold);
              border-radius:1px;transition:width .6s ease, background .6s ease}
  .beam .fill.hot{background:linear-gradient(90deg,var(--gold),var(--oxide))}
  .beam .feather{position:absolute;right:-4px;top:-16px;font-size:14px;color:var(--gold)}
  .nums{display:flex;justify-content:space-between;font-family:var(--mono);
        font-size:12.5px;color:var(--sand);margin-top:6px}
  .nums b{color:var(--papyrus)}
  .reason{font-family:var(--mono);font-size:11.5px;color:var(--oxide);margin-top:8px;
          line-height:1.5}

  .actions{margin-top:12px;display:flex;gap:8px}
  button{font-family:var(--mono);font-size:12px;letter-spacing:.06em;cursor:pointer;
         background:none;border:1px solid var(--line);color:var(--papyrus);
         padding:6px 14px;border-radius:2px}
  button:hover,button:focus-visible{border-color:var(--gold);outline:none}
  button:focus-visible{box-shadow:0 0 0 2px var(--gold)}
  button.kill{border-color:var(--oxide);color:var(--oxide)}
  button.resume{border-color:var(--faience);color:var(--faience)}
  #unleash{border-color:var(--gold);color:var(--gold)}
  #unleash:disabled{opacity:.5;cursor:wait}
  a.rep{font-family:var(--mono);font-size:12px;color:var(--gold);
        align-self:center;text-decoration:none;border-bottom:1px dotted var(--gold)}

  .stamp{position:absolute;right:-8px;top:14px;transform:rotate(12deg);
         font-family:var(--display);font-variant:small-caps;letter-spacing:.3em;
         color:var(--oxide);border:2px solid var(--oxide);padding:2px 10px 2px 13px;
         font-size:13px;opacity:.9;background:rgba(20,18,14,.65)}

  .ledger{border:1px solid var(--line);background:var(--basalt);border-radius:3px;
          max-height:340px;overflow-y:auto}
  .ev{display:grid;grid-template-columns:76px 130px 1fr;gap:12px;align-items:baseline;
      padding:7px 14px;border-bottom:1px solid #24201786;font-family:var(--mono);
      font-size:12.5px;border-left:3px solid transparent}
  .ev:first-child{animation:arrive .5s ease}
  @keyframes arrive{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
  .ev .t{color:var(--sand)} .ev .w{color:var(--papyrus);overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap}
  .ev .m{color:var(--sand)}
  .ev.info{border-left-color:var(--line)}
  .ev.warn{border-left-color:var(--gold)} .ev.warn .m{color:var(--gold)}
  .ev.kill{border-left-color:var(--oxide)} .ev.kill .m{color:var(--oxide)}

  .empty{padding:34px;text-align:center;color:var(--sand);font-family:var(--mono);
         font-size:13px;border:1px dashed var(--line);border-radius:3px;line-height:1.8}
  .empty code{color:var(--gold)}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<header>
  <div class="mark"><span class="glyph">𓆄</span>MAAT</div>
  <div class="tag">every token, weighed</div>
  <div class="spacer"></div>
  <div class="chip">upstream <b id="mode">—</b></div>
  <div class="totals">total <b id="tSpent">$0.0000</b> · <span id="tCalls">0</span> calls</div>
  <button id="unleash" hidden>⚡ Unleash a rogue agent</button>
</header>

<h2>Workflows</h2>
<div id="grid" class="grid"></div>
<div id="emptyWf" class="empty" hidden>
  No workflows yet. Point an agent at <code>http://localhost:8080/v1</code>
  with an <code>X-Workflow-Id</code> header and its spend appears here.
</div>

<h2>The Ledger</h2>
<div id="ledger" class="ledger"></div>
<div id="emptyEv" class="empty" hidden>Judgments and calls will be recorded here.</div>

<script>
const $=id=>document.getElementById(id);
const fmt$=v=>"$"+(+v).toFixed(4);
const esc=s=>String(s).replace(/[&<>"'`]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;","`":"&#96;"}[c]));

const un=document.getElementById("unleash");
un.addEventListener("click",async()=>{
  un.disabled=true;un.textContent="rogue agent running…";
  try{await fetch("/admin/demo/rogue",{method:"POST"});}
  finally{un.disabled=false;un.textContent="⚡ Unleash a rogue agent";refresh();}
});

document.addEventListener("click",e=>{
  const b=e.target.closest("button[data-verb]");
  if(b) act(b.dataset.wf,b.dataset.verb);
});

async function act(wf,verb){
  await fetch(`/admin/workflows/${encodeURIComponent(wf)}/${verb}`,{method:"POST"});
  refresh();
}

function card(w,cfg){
  const frac=w.budget_usd>0?Math.min(w.spent_usd/w.budget_usd,1):1;
  const killed=w.status==="killed";
  const hot=frac>=(cfg.downgrade_at||0.9);
  return `<div class="card ${killed?"killed":""}">
    ${killed?'<div class="stamp">judged</div>':""}
    <div class="row">
      <div class="wfname" title="${esc(w.id)}">${esc(w.id)}</div>
      ${w.mode==="observe"?'<span class="badge" style="border-color:var(--faience);color:var(--faience)">observe</span>':""}
      ${w.downgraded?'<span class="badge">downgraded</span>':""}
      <span class="pill ${killed?"killed":"active"}">${killed?"KILLED":"ACTIVE"}</span>
    </div>
    <div class="beam"><div class="bar">
      <div class="fill ${hot?"hot":""}" style="width:${(frac*100).toFixed(1)}%"></div>
      <div class="feather" title="budget">𓆄</div>
    </div></div>
    <div class="nums"><span><b>${fmt$(w.spent_usd)}</b> of ${fmt$(w.budget_usd)}</span>
      <span>${(frac*100).toFixed(0)}% · ${w.calls} calls</span></div>
    ${killed&&w.killed_reason?`<div class="reason">⚖ ${esc(w.killed_reason)}</div>`:""}
    <div class="actions">${killed
      ?`<button class="resume" data-verb="resume" data-wf="${esc(w.id)}">Resume workflow</button>
        <a class="rep" href="/admin/workflows/${encodeURIComponent(w.id)}/report" target="_blank" rel="noopener">Incident report ↗</a>`
      :`<button class="kill" data-verb="kill" data-wf="${esc(w.id)}">Kill workflow</button>`}
    </div>
  </div>`;
}

function ev(e){
  const t=new Date(e.ts*1000).toLocaleTimeString([], {hour12:false});
  return `<div class="ev ${esc(e.severity)}"><span class="t">${t}</span>
    <span class="w">${esc(e.workflow_id||"—")}</span>
    <span class="m">[${esc(e.type)}] ${esc(e.message)}</span></div>`;
}

async function refresh(){
  try{
    const s=await (await fetch("/admin/state")).json();
    $("mode").textContent=s.config.upstream_mode;
    un.hidden=s.config.upstream_mode!=="mock";
    $("tSpent").textContent=fmt$(s.totals.spent);
    $("tCalls").textContent=s.totals.calls;
    $("grid").innerHTML=s.workflows.map(w=>card(w,s.config)).join("");
    $("emptyWf").hidden=s.workflows.length>0;
    $("ledger").innerHTML=s.events.map(ev).join("");
    $("emptyEv").hidden=s.events.length>0;
    $("ledger").hidden=s.events.length===0;
  }catch(e){/* gateway restarting; retry next tick */}
}
refresh();
setInterval(refresh,2000);
</script>
</body>
</html>
